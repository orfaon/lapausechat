<svg viewBox="0 0 180 210" xmlns="http://www.w3.org/2000/svg">

  <!-- Tail (dessinée en premier, le corps la cache à sa base) -->
  <path d="M 140,158 C 174,136 184,96 164,80 C 156,72 145,77 148,87 C 155,102 152,138 123,158"
        stroke="#c57318" stroke-width="19" stroke-linecap="round" fill="none"/>
  <path d="M 140,158 C 174,136 184,96 164,80 C 156,72 145,77 148,87 C 155,102 152,138 123,158"
        stroke="#F4A340" stroke-width="12" stroke-linecap="round" fill="none"/>

  <!-- Corps -->
  <ellipse cx="90" cy="170" rx="60" ry="47" fill="#F4A340"/>

  <!-- Oreille gauche extérieure -->
  <polygon points="42,70 38,12 76,58" fill="#F4A340"/>
  <!-- Oreille gauche intérieure -->
  <polygon points="48,67 46,24 70,58" fill="#f5a0b8"/>

  <!-- Oreille droite extérieure -->
  <polygon points="138,70 142,12 104,58" fill="#F4A340"/>
  <!-- Oreille droite intérieure -->
  <polygon points="132,67 134,24 110,58" fill="#f5a0b8"/>

  <!-- Tête -->
  <circle cx="90" cy="90" r="57" fill="#F4A340"/>

  <!-- Zone ventre plus claire -->
  <ellipse cx="90" cy="175" rx="35" ry="31" fill="#ffca6e" opacity="0.5"/>

  <!-- Stries du front -->
  <path d="M 83,50 Q 81,40 84,50" stroke="#c57318" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M 90,48 Q 90,38 90,48" stroke="#c57318" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M 97,50 Q 99,40 96,50" stroke="#c57318" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Yeux - sclérotique -->
  <ellipse cx="71" cy="88" rx="14" ry="15" fill="#fff"/>
  <ellipse cx="109" cy="88" rx="14" ry="15" fill="#fff"/>

  <!-- Yeux - iris vert-sarcelle -->
  <ellipse cx="73" cy="90" rx="10" ry="12" fill="#4ecf92"/>
  <ellipse cx="107" cy="90" rx="10" ry="12" fill="#4ecf92"/>

  <!-- Yeux - pupille (fente verticale) -->
  <ellipse cx="73" cy="90" rx="4" ry="10" fill="#0d0820"/>
  <ellipse cx="107" cy="90" rx="4" ry="10" fill="#0d0820"/>

  <!-- Yeux - reflet -->
  <circle cx="67" cy="83" r="3.2" fill="white"/>
  <circle cx="101" cy="83" r="3.2" fill="white"/>

  <!-- Nez -->
  <path d="M 90,108 L 85,117 L 95,117 Z" fill="#f07090"/>

  <!-- Bouche -->
  <path d="M 85,117 Q 90,124 95,117" stroke="#c05820" stroke-width="1.6"
        fill="none" stroke-linecap="round"/>

  <!-- Moustaches gauche -->
  <line x1="83" y1="111" x2="38"  y2="103" stroke="#ffe0a0" stroke-width="1.1" opacity="0.65"/>
  <line x1="83" y1="114" x2="38"  y2="114" stroke="#ffe0a0" stroke-width="1.1" opacity="0.65"/>
  <line x1="83" y1="117" x2="38"  y2="125" stroke="#ffe0a0" stroke-width="1.1" opacity="0.65"/>

  <!-- Moustaches droite -->
  <line x1="97" y1="111" x2="142" y2="103" stroke="#ffe0a0" stroke-width="1.1" opacity="0.65"/>
  <line x1="97" y1="114" x2="142" y2="114" stroke="#ffe0a0" stroke-width="1.1" opacity="0.65"/>
  <line x1="97" y1="117" x2="142" y2="125" stroke="#ffe0a0" stroke-width="1.1" opacity="0.65"/>

  <!-- Pattes -->
  <ellipse cx="60"  cy="207" rx="23" ry="10" fill="#c57318"/>
  <ellipse cx="120" cy="207" rx="23" ry="10" fill="#c57318"/>
  <ellipse cx="60"  cy="205" rx="21" ry="8"  fill="#F4A340"/>
  <ellipse cx="120" cy="205" rx="21" ry="8"  fill="#F4A340"/>

  <!-- Orteils gauche -->
  <ellipse cx="50"  cy="204" rx="5.5" ry="3.5" fill="#c07018"/>
  <ellipse cx="60"  cy="202" rx="5.5" ry="3.5" fill="#c07018"/>
  <ellipse cx="70"  cy="204" rx="5.5" ry="3.5" fill="#c07018"/>

  <!-- Orteils droit -->
  <ellipse cx="110" cy="204" rx="5.5" ry="3.5" fill="#c07018"/>
  <ellipse cx="120" cy="202" rx="5.5" ry="3.5" fill="#c07018"/>
  <ellipse cx="130" cy="204" rx="5.5" ry="3.5" fill="#c07018"/>

</svg>
