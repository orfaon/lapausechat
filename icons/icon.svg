<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <!-- Body circle background -->
  <circle cx="24" cy="27" r="19" fill="#F4A340"/>
  <!-- Left ear -->
  <polygon points="10,19 5,4 19,16" fill="#F4A340"/>
  <polygon points="11,18 7,8 18,16" fill="#FFAAB5"/>
  <!-- Right ear -->
  <polygon points="38,19 43,4 29,16" fill="#F4A340"/>
  <polygon points="37,18 41,8 30,16" fill="#FFAAB5"/>
  <!-- Happy closed eyes -->
  <path d="M15,25 Q19,20 23,25" stroke="#5C3317" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M25,25 Q29,20 33,25" stroke="#5C3317" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Nose -->
  <ellipse cx="24" cy="31" rx="3" ry="2" fill="#FF8FAB"/>
  <!-- Mouth -->
  <path d="M21,33 Q24,37 27,33" stroke="#5C3317" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <!-- Whiskers -->
  <line x1="3" y1="30" x2="19" y2="31" stroke="#5C3317" stroke-width="1.2" opacity="0.55"/>
  <line x1="3" y1="34" x2="19" y2="33" stroke="#5C3317" stroke-width="1.2" opacity="0.55"/>
  <line x1="29" y1="31" x2="45" y2="30" stroke="#5C3317" stroke-width="1.2" opacity="0.55"/>
  <line x1="29" y1="33" x2="45" y2="34" stroke="#5C3317" stroke-width="1.2" opacity="0.55"/>
  <!-- Rosy cheeks -->
  <ellipse cx="14" cy="29" rx="5" ry="3" fill="#FFB3C1" opacity="0.5"/>
  <ellipse cx="34" cy="29" rx="5" ry="3" fill="#FFB3C1" opacity="0.5"/>
</svg>
